<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentação API Argus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-app: #030712; 
            --bg-panel: rgba(10, 15, 30, 0.5);
            --bg-card: rgba(15, 23, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #01af96;
            --accent-blue: #3b82f6;
            --hover-bg: rgba(255, 255, 255, 0.04);
            --table-header: rgba(15, 23, 42, 0.8);
            
            --code-bg: rgba(2, 6, 23, 0.7);
            --code-border: rgba(255, 255, 255, 0.05);
            --code-text: #e2e8f0;
            --code-icon-bg: rgba(255, 255, 255, 0.05);
            --code-icon-hover: rgba(255, 255, 255, 0.15);
            
            --syn-key: #38bdf8;
            --syn-type: #c084fc;
            --syn-comment: #64748b;
            --syn-string: #c3e88d;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-app); 
            color: var(--text-main); 
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(150, 150, 150, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(150, 150, 150, 0.5); }
        
        .glass-panel {
            background-color: var(--bg-panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .menu-link { transition: all 0.2s ease; border-left: 2px solid transparent; }
        .menu-link:hover { background-color: var(--hover-bg); color: var(--text-main); }
        .menu-link.active { background-color: var(--hover-bg); color: var(--text-main); border-left-color: var(--accent); }
        
        input[type="search"] { background-color: var(--bg-card); color: var(--text-main); border-color: var(--border-color); }

        .code-block { background: var(--code-bg); color: var(--code-text); transition: all 0.3s ease; }
        .code-icon { background: var(--code-icon-bg); color: var(--text-muted); transition: all 0.2s ease; }
        .code-icon:hover { background: var(--code-icon-hover); color: var(--text-main); transform: scale(1.05); }

        .animate-fade-in { 
            opacity: 0;
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            will-change: transform, opacity;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-press:active { transform: scale(0.97); }

        .postman-btn {
            background-color: #00ac9e;
            box-shadow: 0 4px 14px 0 rgba(0, 172, 158, 0.39);
        }
        .postman-btn:hover {
            box-shadow: 0 6px 20px rgba(0, 172, 158, 0.23);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="h-auto min-h-screen w-screen flex items-start lg:items-center justify-center p-0 lg:p-4 relative overflow-y-auto lg:overflow-hidden">

    <div class="ambient-glow fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-20%] left-[-10%] w-[50vw] h-[50vw] bg-[#233b76] rounded-full mix-blend-screen filter blur-[140px] opacity-20 animate-pulse" style="animation-duration: 8s;"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] bg-[#01af96] rounded-full mix-blend-screen filter blur-[140px] opacity-10 animate-pulse" style="animation-duration: 12s;"></div>
        <div class="absolute top-[30%] left-[40%] w-[40vw] h-[40vw] bg-[#09142c] rounded-full mix-blend-screen filter blur-[120px] opacity-40"></div>
    </div>

    <div class="w-full max-w-[1600px] h-auto lg:h-[95vh] lg:border border-[var(--border-color)] lg:rounded-2xl flex flex-col lg:flex-row shadow-2xl relative z-10 glass-panel">
        
        <aside class="w-full lg:w-[320px] lg:border-r border-b lg:border-b-0 border-[var(--border-color)] flex flex-col shrink-0 lg:h-full h-auto">
            <div class="h-[76px] flex items-center justify-between px-6 border-b border-[var(--border-color)] shrink-0 bg-[var(--bg-app)] lg:bg-transparent sticky top-0 z-50">
    <div id="logo-container" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
        <img id="logo-img" src="Logo-tema-escuro.png" alt="API Argus" class="h-8 max-w-[160px] object-contain rounded" onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cmVjdCB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIGZpbGw9InRyYW5zcGFyZW50IiByeD0iOCIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0ic2Fucy1zZXJpZiIgZm9udC1zaXplPSIxNHB4IiBmaWxsPSIjOThhMmIzIiBkeT0iLjNlbSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+QVJHVVM8L3RleHQ+PC9zdmc+';">
    </div>
    <button id="mobile-menu-btn" class="lg:hidden text-[var(--text-muted)] hover:text-[var(--text-main)] transition-colors p-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
</div>
            
            <div id="sidebar-content" class="hidden lg:flex flex-col w-full h-[calc(100vh-76px)] lg:h-full fixed lg:relative top-[76px] lg:top-0 left-0 bg-[var(--bg-app)] lg:bg-transparent z-50 overflow-hidden">
            <div class="px-4 py-4 border-b border-[var(--border-color)] shrink-0 flex flex-col gap-3">
                <div class="relative">
                    <svg class="w-4 h-4 text-[var(--text-muted)] absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="search" id="search-input" placeholder="Buscar endpoints..." class="w-full bg-[var(--bg-card)] border border-[var(--border-color)] text-[13px] rounded-lg py-2 pl-9 pr-3 text-[var(--text-main)] focus:outline-none focus:border-[var(--accent)] transition-colors placeholder-[var(--text-muted)] shadow-inner">
                </div>
                
                <button onclick="downloadPostmanCollection()" class="postman-btn text-white w-full py-2.5 rounded-lg text-[12px] font-bold tracking-wide flex items-center justify-center gap-2 transition-all">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21.571 10.973c-.015-.067-.034-.132-.058-.195a1.5 1.5 0 0 0-.256-.47l-6-7A1.5 1.5 0 0 0 14.116 3H5.5A2.5 2.5 0 0 0 3 5.5v13A2.5 2.5 0 0 0 5.5 21h13a2.5 2.5 0 0 0 2.5-2.5v-7.228c0-.102-.01-.202-.029-.3zM15 5.222 18.667 9H15V5.222zM18.5 19h-13a1 1 0 0 1-1-1v-13a1 1 0 0 1 1-1h9v6.5A1.5 1.5 0 0 0 16.5 10.5h4v7.5a1 1 0 0 1-1 1z"/>
                        <path d="M12.5 13.5h-5a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1zM12.5 16.5h-5a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1z"/>
                    </svg>
                    Baixar Postman Collection
                </button>
            </div>

           <nav class="flex-1 overflow-y-auto py-3 px-3 space-y-2" id="sidebar-nav"></nav>
</div>
        </aside>

        <main class="flex-1 min-w-0 flex flex-col relative lg:overflow-y-auto lg:border-r border-[var(--border-color)] min-h-zero lg:min-h-[500px]">
            <header class="h-[76px] border-b border-[var(--border-color)] flex items-center px-6 lg:px-10 sticky top-0 bg-[var(--bg-panel)] backdrop-blur-md z-10 shrink-0">
                <h2 class="text-[16px] font-semibold text-[var(--text-main)] tracking-wide">Documentação Técnica</h2>
            </header>

            <div class="p-6 lg:p-10 max-w-4xl" id="doc-content">
                <p class="text-[var(--text-muted)] leading-relaxed text-[14px]">Selecione uma integração no menu lateral para visualizar os detalhes estruturais, parâmetros, observações e retornos documentados da API Argus.</p>
            </div>
        </main>

        <aside id="right-sidebar" class="w-full lg:w-[500px] min-w-0 flex flex-col shrink-0 bg-black/10 border-t lg:border-t-0 border-[var(--border-color)] min-h-zero lg:min-h-[400px]">
            <div class="h-[76px] flex items-center justify-between px-6 lg:px-8 border-b border-[var(--border-color)] bg-[var(--bg-panel)] backdrop-blur-md sticky top-0 z-10 shrink-0">
                <h3 class="text-[12px] font-semibold text-[var(--text-main)] tracking-widest uppercase opacity-80">Exemplo</h3>
                <button id="btn-copy-all" class="btn-press text-[11px] font-semibold bg-[var(--bg-card)] hover:bg-[var(--hover-bg)] text-[var(--text-main)] px-4 py-2 rounded-lg transition-all border border-[var(--border-color)] flex items-center gap-2 shadow-sm">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    <span class="hidden md:inline">Copiar Snippet</span>
                </button>
            </div>

            <div class="flex-1 lg:overflow-y-auto p-6" id="snippet-area">
                <p class="text-[13px] text-[var(--text-muted)] mt-2">Nenhum endpoint selecionado.</p>
            </div>
        </aside>
    </div>


    <script>
        window.currentLang = 'nodejs';
        window.currentItem = null;
        window.snippetCache = {};
        window.currentRawSnippetText = "";

        window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
        const content = document.getElementById('sidebar-content');
        content.classList.toggle('hidden');
        content.classList.toggle('flex');
    });
    
    setTimeout(() => { goToEndpoint('quick-start'); }, 100);
});


        function copyFromCache(cacheId, btnElement) {
            const text = window.snippetCache[cacheId];
            if(!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const originalHtml = btnElement.innerHTML;
                btnElement.innerHTML = `<svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                setTimeout(() => { btnElement.innerHTML = originalHtml; }, 2000);
            });
        }

        document.getElementById('btn-copy-all').addEventListener('click', function() {
            if (!window.currentRawSnippetText) return;
            navigator.clipboard.writeText(window.currentRawSnippetText).then(() => {
                const originalContent = this.innerHTML;
                this.innerHTML = `<svg class="w-3.5 h-3.5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span class="text-emerald-500 hidden md:inline">Copiado</span>`;
                setTimeout(() => {
                    this.innerHTML = originalContent;
                }, 2000);
            });
        });

        window.changeLang = function(lang) {
            window.currentLang = lang;
            if(window.currentItem) { renderSnippets(window.currentItem); }
        };

        window.goToEndpoint = function(id) {
            const item = apiData.flatMap(c => c.items).find(i => i.id === id);
            if(item) {
                document.querySelectorAll('.menu-link').forEach(el => el.classList.remove('active'));
                const linkEl = document.querySelector(`[data-id="${id}"]`);
                if(linkEl) linkEl.classList.add('active');
                
                const parentContainer = linkEl.closest('.links-container');
                if(parentContainer && parentContainer.classList.contains('hidden')) {
                    parentContainer.classList.remove('hidden');
                    const header = parentContainer.previousElementSibling;
                    if(header) header.querySelector('.arrow-icon').classList.remove('-rotate-90');
                }
                
               if (window.innerWidth < 1024) {
    document.getElementById('doc-content').scrollIntoView({ behavior: 'smooth' });
    const content = document.getElementById('sidebar-content');
    if (!content.classList.contains('hidden')) {
        content.classList.add('hidden');
        content.classList.remove('flex');
    }
}
                
                loadDocumentation(item);
            }
        };

        const apiData = [
            {
                category: "Guia de Integração",
                items: [
                    { 
                        id: "quick-start", title: "Primeiros Passos (Quick Start)", method: "", url: "", 
                        desc: `
                        <h3 class='text-[18px] font-bold text-[var(--text-main)] mb-4 mt-2'>Como a API Argus funciona?</h3>
                        <p class='mb-6'>A integração com o nosso sistema foi desenhada para ser rápida, assíncrona e orientada a eventos. O fluxo de vida de uma operação bem sucedida segue 4 passos fundamentais:</p>
                        
                        <div class='grid grid-cols-1 md:grid-cols-2 gap-4 my-6'>
                            <div class='bg-[var(--bg-card)] p-6 rounded-xl border border-[var(--border-color)] shadow-sm hover:border-[var(--accent)] transition-colors'>
                                <div class='w-8 h-8 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center font-bold mb-4 border border-blue-500/30'>1</div>
                                <h4 class='font-bold text-[var(--text-main)] mb-2'>Autenticação</h4>
                                <p class='text-[13px] text-[var(--text-muted)] leading-relaxed'>Obtenha sua chave de acesso no painel do Argus (Configurações > Desenvolvedor). Ela deve ser enviada no Header <code class='text-[11px] bg-black/30 px-1 py-0.5 rounded text-blue-300'>Token-Signature</code> em todas as requisições.</p>
                            </div>
                            
                            <div class='bg-[var(--bg-card)] p-6 rounded-xl border border-[var(--border-color)] shadow-sm hover:border-[var(--accent)] transition-colors'>
                                <div class='w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center font-bold mb-4 border border-emerald-500/30'>2</div>
                                <h4 class='font-bold text-[var(--text-main)] mb-2'>Injeção de Dados</h4>
                                <p class='text-[13px] text-[var(--text-muted)] leading-relaxed'>Alimente o Argus com contatos. Use o <a href='#' onclick='goToEndpoint("upload-mailing")' class='text-[var(--accent)] hover:underline font-medium'>Upload de CSV</a> para grandes volumes ou o <a href='#' onclick='goToEndpoint("novo-lead")' class='text-[var(--accent)] hover:underline font-medium'>Novo Lead Unitário</a> para integrar com CRMs em tempo real.</p>
                            </div>
                            
                            <div class='bg-[var(--bg-card)] p-6 rounded-xl border border-[var(--border-color)] shadow-sm hover:border-[var(--accent)] transition-colors'>
                                <div class='w-8 h-8 rounded-full bg-purple-500/20 text-purple-400 flex items-center justify-center font-bold mb-4 border border-purple-500/30'>3</div>
                                <h4 class='font-bold text-[var(--text-main)] mb-2'>Controle Operacional</h4>
                                <p class='text-[13px] text-[var(--text-muted)] leading-relaxed'>Gerencie operadores e ligações remotamente: <a href='#' onclick='goToEndpoint("logar-op")' class='text-[var(--accent)] hover:underline font-medium'>Logar</a>, <a href='#' onclick='goToEndpoint("pausar")' class='text-[var(--accent)] hover:underline font-medium'>Pausar</a>, fazer disparo de rediscagem via <a href='#' onclick='goToEndpoint("click2call")' class='text-[var(--accent)] hover:underline font-medium'>Click2Call</a> ou forçar <a href='#' onclick='goToEndpoint("tabular-lead")' class='text-[var(--accent)] hover:underline font-medium'>Tabulações de Lead</a>.</p>
                            </div>
                            
                            <div class='bg-[var(--bg-card)] p-6 rounded-xl border border-[var(--border-color)] shadow-sm hover:border-[var(--accent)] transition-colors'>
                                <div class='w-8 h-8 rounded-full bg-orange-500/20 text-orange-400 flex items-center justify-center font-bold mb-4 border border-orange-500/30'>4</div>
                                <h4 class='font-bold text-[var(--text-main)] mb-2'>Retorno (Webhooks)</h4>
                                <p class='text-[13px] text-[var(--text-muted)] leading-relaxed'>Cadastre seus <a href='#' onclick='goToEndpoint("wh-tabulacao")' class='text-[var(--accent)] hover:underline font-medium'>Webhooks</a> no sistema. O Argus avisará seu servidor instantaneamente (via POST) sempre que um atendimento for iniciado ou tabulado pelo operador.</p>
                            </div>
                        </div>
                        
                        <div class='mt-8 p-5 bg-[var(--bg-card)] border border-[var(--border-color)] rounded-xl flex flex-col md:flex-row items-center justify-between'>
                            <div>
                                <h4 class='font-bold text-[14px] text-[var(--text-main)]'>Quer testar rápido?</h4>
                                <p class='text-[13px] text-[var(--text-muted)] mt-1'>Faça o download da nossa Postman Collection no menu lateral esquerdo e importe no seu Postman/Insomnia. Todas as rotas já estão pré-configuradas!</p>
                            </div>
                        </div>
                        `, 
                        hasBody: false 
                    }
                ]
            },
            {
                category: "Autenticação",
                items: [
                    { 
                        id: "auth", title: "Autenticação", method: "INFO", url: "", 
                        desc: "Todas as solicitações para a API são autenticadas fornecendo sua chave de API. A chave de API deve ser fornecida como um cabeçalho HTTP denominado: Token-Signature<br><br><span class='font-mono bg-[var(--bg-card)] border border-[var(--border-color)] p-3 block md:inline-block rounded text-[13px] shadow-sm break-all'>curl -H \"Token-Signature: SEU_TOKEN_AQUI\" https://argus.app.br/</span><br><br>Sua chave de API pode ser encontrada no painel do sistema acessando o menu: <strong>Configurações - Desenvolvedor - Acesso API</strong>", 
                        hasBody: false 
                    }
                ]
            },
            {
                category: "Controle de Mailing",
                items: [
                    { 
                        id: "listar-skills", title: "Listar Skills", method: "GET", url: "https://argus.app.br/apiargus/cmd/skills?idCampanha=&idSistemaIntegracao=",
                        desc: "Retorna a lista de Skills com os {hashSkill} para utilização nos endpoints para importação de mailings.<br>Skills são separações de mailings que podem estar vinculados à uma equipe ou unidade de trabalho. Pode também ser divisões de tipos de mailings com habilidades de trabalhos diferentes.<br>Para importar um mailing, é obrigatório que o usuário escolha qual o destino do Skill que o mailing será importado.", 
                        hasBody: false, 
                        rawResponse: `{\n  "codStatus": 1, // 1: Sucesso; < 1 Falha\n  "descStatus": "Sucesso", // descrição do sucesso/falha\n  "retornoGetSkillsItens": [\n    {\n      "idCampanha": 12, // Código da Campanha\n      "idSkill": 105, // Código do Skill\n      "descricaoCampanha": "Campanha Principal", // Descrição da campanha\n      "descricaoSkill": "Skill de Vendas", // Descrição do Skill\n      "descricaoCompleta": "Campanha Principal - Skill de Vendas", // Descrição da Campanha + Skill\n      "idSistemaIntegracao": 1, // Código do sistema de integração\n      "descricaoSistemaIntegracao": "Sistema Padrão", // Descrição do sistema de integração\n      "hashEndpointSkill": "A1B2C3D4E5" // Referência {hashSkill}\n    }\n  ]\n}`,
                        params: [
                            { name: "idCampanha", req: "Opcional", desc: "Retorna apenas os Skills da campanha. Caso não passe este parâmetro, retornará os skills de todas as campanhas." }, 
                            { name: "idSistemaIntegracao", req: "Opcional", desc: "Retorna apenas os Skills vinculados com o sistema de integração escolhido." }
                        ]
                    },
                    { 
                        id: "upload-mailing", title: "Upload de Mailing por Arquivo CSV", method: "POST", url: "https://argus.app.br/apiargus/{hashSkill}/uploadmailing", 
                        desc: `Realiza a importação de arquivo CSV. Na configuração do endpoint é necessário escolher previamente o layout que será utilizado na importação.<br><br>Obs: é aceito apenas um upload por vez. Para enviar um novo arquivo é necessário aguardar o término da importação do primeiro.<br><br><span class='font-semibold text-[var(--text-main)] block mb-2 mt-6'>Formatos de upload aceitos:</span><br>1. Formato Preferencial - Upload no body "form-data": a descrição do mailing a ser criado dentro do Argus será o mesmo nome do arquivo importado no "VALUE".<br><br>
                        <div class='bg-[var(--bg-card)] border border-[var(--border-color)] rounded-xl p-5 mb-5 mt-2 overflow-x-auto shadow-sm'>
                            <div class='flex gap-6 mb-4 text-[12px] font-medium text-[var(--text-muted)] border-b border-[var(--border-color)] pb-3'>
                               <span>Params</span> <span>Authorization</span> <span>Headers (9)</span> <span class='text-orange-500 border-b-2 border-orange-500 pb-3 -mb-[13px]'>Body</span> <span>Pre-request Script</span> <span>Tests</span>
                            </div>
                            <div class='flex gap-5 mb-5 text-[12px] text-[var(--text-muted)]'>
                               <span class='flex items-center gap-1.5'><input type='radio' disabled> none</span>
                               <span class='flex items-center gap-1.5 text-[var(--text-main)]'><input type='radio' checked disabled class='accent-orange-500'> form-data</span>
                               <span class='flex items-center gap-1.5'><input type='radio' disabled> x-www-form-urlencoded</span>
                               <span class='flex items-center gap-1.5'><input type='radio' disabled> raw</span>
                               <span class='flex items-center gap-1.5'><input type='radio' disabled> binary</span>
                            </div>
                            <table class='w-full text-left border-collapse text-[12px]'>
                               <thead><tr class='text-[10px] text-[var(--text-muted)] uppercase tracking-widest border-b border-[var(--border-color)]'><th class='py-2 px-3 font-medium border-r border-[var(--border-color)]'>KEY</th><th class='py-2 px-3 font-medium'>VALUE</th></tr></thead>
                               <tbody><tr><td class='py-3 px-3 border-r border-[var(--border-color)]'></td><td class='py-3 px-3 text-[var(--text-main)] font-mono bg-[var(--hover-bg)] rounded'>Exportacao_conteudo_mailing_generico.csv</td></tr></tbody>
                            </table>
                        </div>

        function highlightCustomJSON(text) {
            if (!text) return "";
            let lines = text.split('\n');
            return lines.map(line => {
                line = line.replace(/("[^"]+"):/g, '<span style="color: var(--syn-key);">$1</span>:');
                line = line.replace(/:\s*(int|string|double|date|boolean|bool|datetime|\[string\]|\[\])(,?)/g, ': <span style="color: var(--syn-type); font-weight: 500;">$1</span>$2');
                line = line.replace(/(:\s*<span[^>]+>[^<]+<\/span>,?)\s+(.+)$/, '$1 <span style="color: var(--syn-comment); font-style: italic;">$2</span>');
                
                // Formatação para comentários com "//"
                if (line.includes('//')) {
                    line = line.replace(/(\/\/.*)$/, '<span style="color: var(--syn-comment); font-style: italic;">$1</span>');
                }
                
                if(line.trim().startsWith('//')) {
                    line = `<span style="color: var(--syn-comment); font-style: italic;">${line}</span>`;
                }
                return line;
            }).join('\n');
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        function buildCleanJSON(raw) {
            if (!raw) return "";
            let lines = raw.split('\n');
            let clean = lines.map(line => {
                // Remove comentários do payload limpo gerado para o Postman e Snippets
                let commentIdx = line.indexOf('//');
                if (commentIdx !== -1) {
                    let beforeComment = line.substring(0, commentIdx).trimEnd();
                    line = beforeComment;
                }
                
                let idx = line.indexOf(':');
                if (idx === -1) return line;
                
                let key = line.substring(0, idx);
                let rest = line.substring(idx + 1);
                
                let comma = rest.includes(',') ? ',' : '';
                
                if (rest.includes('int') || rest.includes('double')) return key + ': 0' + comma;
                if (rest.includes('boolean') || rest.includes('bool')) return key + ': true' + comma;
                if (rest.includes('[string]')) return key + ': ["string_1", "string_2"]' + comma;
                if (rest.includes('string') || rest.includes('date') || rest.includes('datetime')) return key + ': "string"' + comma;
                
                return line;
            }).join('\n');
            return clean;
        }

                            <table class="w-full text-left border-collapse">
                                <thead class="bg-[var(--table-header)] border-b border-[var(--border-color)] hidden md:table-header-group">
                                    <tr class="text-[10px] text-[var(--text-muted)] uppercase tracking-widest">
                                        <th class="py-3 px-5 font-bold">Código / Chave</th>
                                        <th class="py-3 px-5 font-bold">Descrição Detalhada</th>
                                    </tr>
                                </thead>
                                <tbody>${aRows}</tbody>
                            </table>
                        </div>
                    </div>`;
            }

            let endpointBox = "";
            if (item.url && item.method && item.method !== 'INFO') {
                endpointBox = `<div class="flex flex-col gap-3 mb-8 overflow-x-auto pb-2">`;
                const methodColor = item.method === 'GET' ? 'text-emerald-500' : 'text-blue-500';
                endpointBox += `
                    <div class="flex items-center gap-4 bg-[var(--bg-card)] border border-[var(--border-color)] p-3.5 rounded-xl w-max shadow-md">
                        <span class="font-bold text-[12px] ${methodColor} tracking-wider">${item.method}</span>
                        <span class="font-mono text-[13px] text-[var(--text-muted)] whitespace-nowrap">${item.url}</span>
                    </div>`;
                
                if (item.getUrl) {
                    endpointBox += `
                        <div class="flex items-center gap-4 bg-[var(--bg-card)] border border-[var(--border-color)] p-3.5 rounded-xl w-max shadow-md mt-2">
                            <span class="font-bold text-[12px] text-emerald-500 tracking-wider">GET</span>
                            <span class="font-mono text-[13px] text-[var(--text-muted)] whitespace-nowrap">${item.getUrl}</span>
                        </div>`;
                }
                endpointBox += `</div>`;
            }

            // --- LÓGICA DE NAVEGAÇÃO MINIMALISTA ---
            const allItems = apiData.flatMap(c => c.items);
            const currentIndex = allItems.findIndex(i => i.id === item.id);
            const prevItem = currentIndex > 0 ? allItems[currentIndex - 1] : null;
            const nextItem = currentIndex < allItems.length - 1 ? allItems[currentIndex + 1] : null;

            let navButtons = `<div class="flex justify-between items-center gap-4 mt-12 pt-6 border-t border-[var(--border-color)] w-full text-[13px] font-medium px-1">`;
            
            if (prevItem) {
                navButtons += `<button onclick="goToEndpoint('${prevItem.id}')" class="text-left text-[var(--text-muted)] hover:text-[var(--accent)] transition-colors max-w-[45%] truncate flex items-center gap-1">&larr; ${prevItem.title}</button>`;
            } else {
                navButtons += `<div></div>`;
            }
            
            if (nextItem) {
                navButtons += `<button onclick="goToEndpoint('${nextItem.id}')" class="text-right text-[var(--text-muted)] hover:text-[var(--accent)] transition-colors max-w-[45%] truncate flex items-center gap-1">${nextItem.title} &rarr;</button>`;
            } else {
                navButtons += `<div></div>`;
            }
            navButtons += `</div>`;
            document.getElementById('doc-content').innerHTML = `
                <h3 class="text-[22px] md:text-[26px] font-bold text-[var(--text-main)] mb-5 tracking-tight">${item.title}</h3>
                ${endpointBox}
                <div class="text-[14px] md:text-[15px] leading-relaxed text-[var(--text-muted)] animate-fade-in break-words">
                    ${item.desc}
                </div>
                ${paramsTable}
                ${responseTable}
            `;
            renderSnippets(item);
            // Injeta os botões envelopados em uma div que só aparece no mobile (lg:hidden)
            const mobileWrapper = `<div class="lg:hidden w-full mt-4">${navButtons}</div>`;
            document.getElementById('snippet-area').innerHTML += mobileWrapper;
        }
    </script>
</body>
</html>
