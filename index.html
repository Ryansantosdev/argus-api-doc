<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentação API Argus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-app: #030712; 
            --bg-panel: rgba(10, 15, 30, 0.5);
            --bg-card: rgba(15, 23, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #01af96;
            --accent-blue: #3b82f6;
            --hover-bg: rgba(255, 255, 255, 0.04);
            --table-header: rgba(15, 23, 42, 0.8);
            
            --code-bg: rgba(2, 6, 23, 0.7);
            --code-border: rgba(255, 255, 255, 0.05);
            --code-text: #e2e8f0;
            --code-icon-bg: rgba(255, 255, 255, 0.05);
            --code-icon-hover: rgba(255, 255, 255, 0.15);
            
            --syn-key: #38bdf8;
            --syn-type: #c084fc;
            --syn-comment: #64748b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden;
        }
        
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(150, 150, 150, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(150, 150, 150, 0.5); }
        
        .glass-panel {
            background-color: var(--bg-panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .menu-link { 
            transition: all 0.2s ease; 
            border-left: 2px solid transparent;
        }
        .menu-link:hover { 
            background-color: var(--hover-bg); 
            color: var(--text-main);
        }
        .menu-link.active { 
            background-color: var(--hover-bg); 
            color: var(--text-main); 
            border-left-color: var(--accent); 
        }
        
        input[type="search"] { 
            background-color: var(--bg-card); 
            color: var(--text-main); 
            border-color: var(--border-color); 
        }

        .code-block { 
            background: var(--code-bg); 
            border: 1px solid var(--code-border); 
            color: var(--code-text); 
            transition: all 0.3s ease; 
        }
        .code-icon { 
            background: var(--code-icon-bg); 
            color: var(--text-muted); 
            transition: all 0.2s ease; 
        }
        .code-icon:hover { 
            background: var(--code-icon-hover); 
            color: var(--text-main); 
            transform: scale(1.05);
        }

        .animate-fade-in { 
            opacity: 0;
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            will-change: transform, opacity;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-press:active { transform: scale(0.97); }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-4 relative">

    <div class="ambient-glow fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-20%] left-[-10%] w-[50vw] h-[50vw] bg-[#233b76] rounded-full mix-blend-screen filter blur-[140px] opacity-20 animate-pulse" style="animation-duration: 8s;"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] bg-[#01af96] rounded-full mix-blend-screen filter blur-[140px] opacity-10 animate-pulse" style="animation-duration: 12s;"></div>
        <div class="absolute top-[30%] left-[40%] w-[40vw] h-[40vw] bg-[#09142c] rounded-full mix-blend-screen filter blur-[120px] opacity-40"></div>
    </div>

    <div class="w-full max-w-[1600px] h-[95vh] border border-[var(--border-color)] rounded-2xl overflow-hidden flex shadow-2xl relative z-10 glass-panel">
        
        <aside class="w-[320px] border-r border-[var(--border-color)] flex flex-col shrink-0">
            <div class="h-[76px] flex items-center px-6 border-b border-[var(--border-color)] shrink-0">
                <div id="logo-container" class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity" onclick="uploadLogo()">
                    <img id="logo-img" src="Logo-tema-escuro.png" alt="API Argus" class="h-8 max-w-[160px] object-contain rounded" onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cmVjdCB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIGZpbGw9InRyYW5zcGFyZW50IiByeD0iOCIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0ic2Fucy1zZXJpZiIgZm9udC1zaXplPSIxNHB4IiBmaWxsPSIjOThhMmIzIiBkeT0iLjNlbSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+QVJHVVM8L3RleHQ+PC9zdmc+';">
                </div>
            </div>
            
            <div class="px-4 py-4 border-b border-[var(--border-color)] shrink-0">
                <div class="relative">
                    <svg class="w-4 h-4 text-[var(--text-muted)] absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="search" id="search-input" placeholder="Buscar endpoints..." class="w-full bg-[var(--bg-card)] border border-[var(--border-color)] text-[13px] rounded-lg py-2 pl-9 pr-3 text-[var(--text-main)] focus:outline-none focus:border-[var(--accent)] transition-colors placeholder-[var(--text-muted)] shadow-inner">
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto py-3 px-3 space-y-2" id="sidebar-nav"></nav>
        </aside>

        <main class="flex-1 flex flex-col relative overflow-y-auto border-r border-[var(--border-color)]">
            <header class="h-[76px] border-b border-[var(--border-color)] flex items-center px-10 sticky top-0 bg-[var(--bg-panel)] backdrop-blur-md z-10">
                <h2 class="text-[16px] font-semibold text-[var(--text-main)] tracking-wide">Documentação Técnica</h2>
            </header>

            <div class="p-10 max-w-4xl" id="doc-content">
                <p class="text-[var(--text-muted)] leading-relaxed text-[14px]">Selecione uma integração no menu lateral para visualizar os detalhes estruturais, parâmetros, observações e retornos documentados da API Argus.</p>
            </div>
        </main>

        <aside class="w-[460px] flex flex-col shrink-0 bg-black/10">
            <div class="h-[76px] flex items-center justify-between px-8 border-b border-[var(--border-color)] bg-[var(--bg-panel)] backdrop-blur-md sticky top-0 z-10">
                <h3 class="text-[12px] font-semibold text-[var(--text-main)] tracking-widest uppercase opacity-80">Exemplo de Requisição</h3>
                <button id="btn-copy-all" class="btn-press text-[11px] font-semibold bg-[var(--bg-card)] hover:bg-[var(--hover-bg)] text-[var(--text-main)] px-4 py-2 rounded-lg transition-all border border-[var(--border-color)] flex items-center gap-2 shadow-sm">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    <span>Copiar Tudo</span>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-8 space-y-8" id="snippet-area">
                <p class="text-[13px] text-[var(--text-muted)]">Nenhum endpoint selecionado.</p>
            </div>
        </aside>
    </div>

    <input type="file" id="logo-upload" accept="image/*" class="hidden">

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const savedLogo = localStorage.getItem('argusLogo');
            if (savedLogo) document.getElementById('logo-img').src = savedLogo;
        });

        function uploadLogo() { document.getElementById('logo-upload').click(); }
        document.getElementById('logo-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64Str = event.target.result;
                    localStorage.setItem('argusLogo', base64Str);
                    document.getElementById('logo-img').src = base64Str;
                };
                reader.readAsDataURL(file);
            }
        });

        window.snippetCache = {};
        window.currentRawSnippetText = "";

        function copyFromCache(cacheId, btnElement) {
            const text = window.snippetCache[cacheId];
            if(!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const originalHtml = btnElement.innerHTML;
                btnElement.innerHTML = `<svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                setTimeout(() => { btnElement.innerHTML = originalHtml; }, 2000);
            });
        }

        document.getElementById('btn-copy-all').addEventListener('click', function() {
            if (!window.currentRawSnippetText) return;
            navigator.clipboard.writeText(window.currentRawSnippetText).then(() => {
                const originalContent = this.innerHTML;
                this.innerHTML = `<svg class="w-3.5 h-3.5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span class="text-emerald-500">Copiado</span>`;
                setTimeout(() => {
                    this.innerHTML = originalContent;
                }, 2000);
            });
        });

        window.goToEndpoint = function(id) {
            const item = apiData.flatMap(c => c.items).find(i => i.id === id);
            if(item) {
                document.querySelectorAll('.menu-link').forEach(el => el.classList.remove('active'));
                const linkEl = document.querySelector(`[data-id="${id}"]`);
                if(linkEl) linkEl.classList.add('active');
                
                // Expande a sanfona caso o link chamado por outra tela esteja fechado
                const parentContainer = linkEl.closest('.links-container');
                if(parentContainer && parentContainer.classList.contains('hidden')) {
                    parentContainer.classList.remove('hidden');
                    const header = parentContainer.previousElementSibling;
                    if(header) header.querySelector('.arrow-icon').classList.remove('-rotate-90');
                }
                
                loadDocumentation(item);
            }
        };

        const apiData = [
            {
                category: "Autenticação",
                items: [
                    { 
                        id: "auth", title: "Autenticação", method: "GET", url: "https://argus.app.br/", 
                        desc: "Todas as solicitações para a API são autenticadas fornecendo sua chave de API. A chave de API deve ser fornecida como um cabeçalho HTTP denominado: Token-Signature<br><br><span class='font-mono bg-[var(--bg-card)] border border-[var(--border-color)] px-2 py-1 rounded text-[13px] shadow-sm'>curl -H \"Token-Signature: YOUR_TOKEN\" https://argus.app.br/</span><br><br>Sua chave de API pode ser encontrada no menu: Configurações - Desenvolvedor - Acesso API", 
                        hasBody: false 
                    }
                ]
            },
            {
                category: "Controle de Mailing",
                items: [
                    { 
                        id: "listar-skills", title: "Listar Skills", method: "POST", acceptsGet: true, url: "https://argus.app.br/apiargus/cmd/skills", getUrl: "https://argus.app.br/apiargus/cmd/skills?idCampanha=&idSistemaIntegracao=",
                        desc: "Retorna a lista de Skills com os {hashSkill} para utilização nos endpoints para importação de mailings.<br>Skills são separações de mailings que podem estar vinculados à uma equipe ou unidade de trabalho. Pode também ser divisões de tipos de mailings com habilidades de trabalhos diferentes.<br>Para importar um mailing, é obrigatório que o usuário escolha qual o destino do Skill que o mailing será importado.", 
                        hasBody: true, 
                        rawPayload: `{\n  "idCampanha": int,\n  "idSistemaIntegracao": int\n}`,
                        rawResponse: `{\n  "codStatus": int,             1: Sucesso; < 1 Falha\n  "descStatus": string,         descrição do sucesso/falha\n  "retornoGetSkillsItens": [\n    {\n      "idCampanha": int,            Código da Campanha\n      "idSkill": int,               Código do Skill\n      "descricaoCampanha": string,  Descrição da campanha\n      "descricaoSkill": string,     Descrição do Skill\n      "descricaoCompleta": string,  Descrição da Campanha + Skill\n      "idSistemaIntegracao": int,   Código do sistema de integração\n      "descricaoSistemaIntegracao": string, Descrição do sistema de integração\n      "hashEndpointSkill": string   Referência {hashSkill}\n    }\n  ]\n}`,
                        params: [
                            { name: "idCampanha", req: "Opcional", desc: "Retorna apenas os Skills da campanha. Caso não passe este parâmetro, retornará os skills de todas as campanhas." }, 
                            { name: "idSistemaIntegracao", req: "Opcional", desc: "Retorna apenas os Skills vinculados com o sistema de integração escolhido." }
                        ]
                    },
                    { 
                        id: "upload-mailing", title: "Upload de Mailing por Arquivo CSV", method: "POST", url: "https://argus.app.br/apiargus/{hashSkill}/uploadmailing", 
                        desc: `Realiza a importação de arquivo CSV. Na configuração do endpoint é necessário escolher previamente o layout que será utilizado na importação.<br><br>Obs: é aceito apenas um upload por vez. Para enviar um novo arquivo é necessário aguardar o término da importação do primeiro.<br><br><span class='font-semibold text-[var(--text-main)] block mb-2 mt-6'>Formatos de upload aceitos:</span><br>1. Formato Preferencial - Upload no body "form-data": a descrição do mailing a ser criado dentro do Argus será o mesmo nome do arquivo importado no "VALUE".<br><br>
                        <div class='bg-[var(--bg-card)] border border-[var(--border-color)] rounded-xl p-5 mb-5 mt-2 overflow-x-auto shadow-sm'>
                            <div class='flex gap-6 mb-4 text-[12px] font-medium text-[var(--text-muted)] border-b border-[var(--border-color)] pb-3'>
                               <span>Params</span> <span>Authorization</span> <span>Headers (9)</span> <span class='text-orange-500 border-b-2 border-orange-500 pb-3 -mb-[13px]'>Body</span> <span>Pre-request Script</span> <span>Tests</span>
                            </div>
                            <div class='flex gap-5 mb-5 text-[12px] text-[var(--text-muted)]'>
                               <span class='flex items-center gap-1.5'><input type='radio' disabled> none</span>
                               <span class='flex items-center gap-1.5 text-[var(--text-main)]'><input type='radio' checked disabled class='accent-orange-500'> form-data</span>
                               <span class='flex items-center gap-1.5'><input type='radio' disabled> x-www-form-urlencoded</span>
                               <span class='flex items-center gap-1.5'><input type='radio' disabled> raw</span>
                               <span class='flex items-center gap-1.5
